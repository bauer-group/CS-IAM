# =============================================================================
# CS-IAM — Zitadel OIDC/IAM Stack — Traefik Mode (HTTPS + Let's Encrypt)
# =============================================================================
# Usage: docker compose -f docker-compose.traefik.yml up -d
#
# Prerequisites:
#   - Traefik v2/v3 on the external ${PROXY_NETWORK} network
#   - DNS: ${IAM_HOSTNAME} -> this host
#
# Zitadel speaks HTTP/2 cleartext (h2c) internally — the Traefik service MUST
# set loadbalancer.server.scheme=h2c or every request returns 502.
#
# The provisioner + directory-sync reach Zitadel at its PUBLIC issuer URL
# (https://${IAM_HOSTNAME}, via Traefik) so the OIDC issuer / JWT audience
# match — they join the proxy network for that. The host must resolve
# ${IAM_HOSTNAME} (public DNS).
# =============================================================================


### Service Templates ###

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"


services:

  # ── Prepare the shared machine-key volume ───────────────────────────────────
  # Fresh named volumes are root:root, but Zitadel runs as the non-root
  # `zitadel` user (uid 1000) and must write the FirstInstance machine key into
  # /data/machinekey. Own it to Zitadel, group-private (0750 — not
  # world-accessible). The root `provisioner` reads it; `directory-sync` runs
  # with gid 1000 (user: "1001:1000") to read it.
  prepare-machinekey:
    image: ${ALPINE_IMAGE:-alpine}:${ALPINE_VERSION:-3.23}
    container_name: ${STACK_NAME:-iam}_PREP
    restart: "no"
    command: ["sh", "-c", "chown 1000:1000 /data/machinekey && chmod 0750 /data/machinekey"]
    volumes:
      - machinekey:/data/machinekey
    networks:
      - local

  # ── PostgreSQL 18 ───────────────────────────────────────────────────────────
  # Tuned for SSD/NVMe by default. For HDD set PG_RANDOM_PAGE_COST=2.0/4.0 and
  # PG_EFFECTIVE_IO_CONCURRENCY=4/2 in .env. Memory + WAL presets for
  # 4/8/16/32 GB hosts are documented in .env.example.
  database-server:
    image: ${POSTGRES_IMAGE:-postgres}:${POSTGRES_VERSION:-18-alpine}
    container_name: ${STACK_NAME:-iam}_DATABASE
    hostname: database-server
    restart: unless-stopped
    <<: *logging
    command: >
      -c max_connections=${PG_MAX_CONNECTIONS:-100}
      -c shared_buffers=${PG_SHARED_BUFFERS:-2GB}
      -c work_mem=${PG_WORK_MEM:-8MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-6GB}
      -c maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-256MB}
      -c max_wal_size=${PG_MAX_WAL_SIZE:-2GB}
      -c min_wal_size=${PG_MIN_WAL_SIZE:-512MB}
      -c random_page_cost=${PG_RANDOM_PAGE_COST:-1.1}
      -c seq_page_cost=1.0
      -c effective_io_concurrency=${PG_EFFECTIVE_IO_CONCURRENCY:-200}
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_parallel_maintenance_workers=2
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    environment:
      - TZ=${TIME_ZONE:-Etc/UTC}
      - PGTZ=${TIME_ZONE:-Etc/UTC}
      - POSTGRES_DB=${ZITADEL_DB_NAME:-zitadel}
      - POSTGRES_USER=${ZITADEL_DB_USER:-zitadel}
      - POSTGRES_PASSWORD=${ZITADEL_DB_PASSWORD:?Set ZITADEL_DB_PASSWORD in .env}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    volumes:
      - database-data:/var/lib/postgresql
    expose:
      - 5432/tcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ZITADEL_DB_USER:-zitadel} -d ${ZITADEL_DB_NAME:-zitadel}"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - local

  # ── Zitadel (OIDC broker, behind Traefik, h2c) ──────────────────────────────
  zitadel:
    image: ${ZITADEL_IMAGE:-ghcr.io/bauer-group/cs-iam/zitadel}:${ZITADEL_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_APP
    hostname: zitadel
    restart: unless-stopped
    <<: *logging
    command: >
      start-from-init
      --masterkey "${ZITADEL_MASTERKEY:?Set ZITADEL_MASTERKEY in .env}"
      --config /zitadel/config/defaults.yaml
      --steps /zitadel/config/steps.yaml
      --tlsMode external
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      ZITADEL_DATABASE_POSTGRES_HOST: database-server
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DB_NAME:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${ZITADEL_DB_USER:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${ZITADEL_DB_USER:-zitadel}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: ${IAM_HOSTNAME:?Set IAM_HOSTNAME in .env}
      ZITADEL_EXTERNALPORT: 443
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:?Set ZITADEL_ADMIN_PASSWORD in .env}
      # Login v2 — route all apps to the hosted login (the `login` service,
      # served under the same domain at /ui/v2/login via Traefik).
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: https://${IAM_HOSTNAME}/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: https://${IAM_HOSTNAME}/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: https://${IAM_HOSTNAME}/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: https://${IAM_HOSTNAME}/ui/v2/login/login?samlRequest=
    volumes:
      # Config (defaults.yaml/steps.yaml) is baked into the image. To override
      # without rebuilding, uncomment and edit the host files:
      # - ./config/zitadel/defaults.yaml:/zitadel/config/defaults.yaml:ro
      # - ./config/zitadel/steps.yaml:/zitadel/config/steps.yaml:ro
      - machinekey:/data/machinekey
    depends_on:
      database-server:
        condition: service_healthy
      prepare-machinekey:
        condition: service_completed_successfully
    networks:
      - local
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-EDGEPROXY}"

      # ── HTTP -> HTTPS redirect ──────────────────────────────────────────
      - "traefik.http.routers.${STACK_NAME:-iam}-http.rule=Host(`${IAM_HOSTNAME}`)"
      - "traefik.http.routers.${STACK_NAME:-iam}-http.entrypoints=web"
      - "traefik.http.routers.${STACK_NAME:-iam}-http.middlewares=${STACK_NAME:-iam}-redirect-to-secure"
      - "traefik.http.middlewares.${STACK_NAME:-iam}-redirect-to-secure.redirectscheme.scheme=https"
      - "traefik.http.middlewares.${STACK_NAME:-iam}-redirect-to-secure.redirectscheme.permanent=true"

      # ── Zitadel — HTTPS (h2c upstream) ──────────────────────────────────
      # Explicit LOW priority: without it Traefik defaults a router's priority
      # to its rule LENGTH, and this catch-all `Host(...)` rule is longer than
      # the login's explicit priority=20 — so it would (wrongly) win for
      # /ui/v2/login. Pin it below the login router so the login is reachable.
      - "traefik.http.routers.${STACK_NAME:-iam}.rule=Host(`${IAM_HOSTNAME}`)"
      - "traefik.http.routers.${STACK_NAME:-iam}.priority=10"
      - "traefik.http.routers.${STACK_NAME:-iam}.entrypoints=web-secure"
      - "traefik.http.routers.${STACK_NAME:-iam}.tls=true"
      - "traefik.http.routers.${STACK_NAME:-iam}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${STACK_NAME:-iam}.service=${STACK_NAME:-iam}"
      - "traefik.http.services.${STACK_NAME:-iam}.loadBalancer.server.port=8080"
      - "traefik.http.services.${STACK_NAME:-iam}.loadBalancer.server.scheme=h2c"

  # ── Login v2 (official hosted login UI; branded via LabelPolicy + theme) ────
  # Served under the same domain at /ui/v2/login (higher Traefik priority than
  # the catch-all Zitadel router). Reads the machine-key PAT (gid 1000); calls
  # Zitadel internally with a Host override so the request hits the instance.
  login:
    image: ${LOGIN_IMAGE:-ghcr.io/bauer-group/cs-iam/login}:${LOGIN_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_LOGIN
    restart: unless-stopped
    user: "1000:1000"
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      ZITADEL_API_URL: http://zitadel:8080
      ZITADEL_SERVICE_USER_TOKEN_FILE: /data/machinekey/iam-admin.pat
      # Pin the public host + scheme on login->core calls (Traefik terminates
      # TLS, so the login talks http internally — X-Forwarded-Proto keeps the
      # issuer https end-to-end).
      CUSTOM_REQUEST_HEADERS: "Host:${IAM_HOSTNAME},X-Forwarded-Proto:https"
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      # Centred layout (upstream default). `side-by-side` needs a background, but
      # Next.js 16 bakes the public/ manifest at build time so the runtime-
      # overlaid background/favicon 404 — keep top-to-bottom + no background
      # until branding moves into the image build (see src/login).
      NEXT_PUBLIC_THEME_LAYOUT: ${LOGIN_THEME_LAYOUT:-top-to-bottom}
      NEXT_PUBLIC_THEME_ROUNDNESS: ${LOGIN_THEME_ROUNDNESS:-mid}
      NEXT_PUBLIC_THEME_SPACING: ${LOGIN_THEME_SPACING:-regular}
      NEXT_PUBLIC_THEME_APPEARANCE: ${LOGIN_THEME_APPEARANCE:-material}
      NEXT_PUBLIC_THEME_BACKGROUND_IMAGE: ${LOGIN_BACKGROUND_IMAGE:-}
    volumes:
      - machinekey:/data/machinekey:ro
    depends_on:
      zitadel:
        condition: service_started
    networks:
      - local
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-EDGEPROXY}"
      - "traefik.http.routers.${STACK_NAME:-iam}-login.rule=Host(`${IAM_HOSTNAME}`) && PathPrefix(`/ui/v2/login`)"
      - "traefik.http.routers.${STACK_NAME:-iam}-login.entrypoints=web-secure"
      - "traefik.http.routers.${STACK_NAME:-iam}-login.tls=true"
      - "traefik.http.routers.${STACK_NAME:-iam}-login.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${STACK_NAME:-iam}-login.priority=20"
      - "traefik.http.routers.${STACK_NAME:-iam}-login.service=${STACK_NAME:-iam}-login"
      - "traefik.http.services.${STACK_NAME:-iam}-login.loadBalancer.server.port=3000"

  # ── Provisioner (OpenTofu IaC, one-shot, non-destructive) ───────────────────
  provisioner:
    image: ${PROVISIONER_IMAGE:-ghcr.io/bauer-group/cs-iam/provisioner}:${PROVISIONER_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_PROVISIONER
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      ZITADEL_DOMAIN: ${IAM_HOSTNAME}
      ZITADEL_PORT: 443
      ZITADEL_INSECURE: "false"
      ZITADEL_JWT_PROFILE_FILE: /data/machinekey/iam-admin.json
      ZITADEL_WAIT_TIMEOUT: ${PROVISIONER_WAIT_TIMEOUT:-180}
      TF_VAR_zitadel_domain: ${IAM_HOSTNAME}
      TF_VAR_zitadel_port: 443
      TF_VAR_zitadel_insecure: "false"
      TF_VAR_role_prefix: ${SYNC_ROLE_PREFIX:-entra:}
      TF_VAR_azure_client_id: ${AZURE_CLIENT_ID:-}
      TF_VAR_azure_client_secret: ${AZURE_CLIENT_SECRET:-}
      TF_VAR_azure_tenant_id: ${AZURE_TENANT_ID:-}
      # External-org IdPs (customer login)
      TF_VAR_external_azure_client_id: ${EXTERNAL_AZURE_CLIENT_ID:-}
      TF_VAR_external_azure_client_secret: ${EXTERNAL_AZURE_CLIENT_SECRET:-}
      TF_VAR_external_google_client_id: ${EXTERNAL_GOOGLE_CLIENT_ID:-}
      TF_VAR_external_google_client_secret: ${EXTERNAL_GOOGLE_CLIENT_SECRET:-}
      TF_VAR_external_oauth_idps: ${EXTERNAL_OAUTH_IDPS:-}
      TF_VAR_external_oidc_idps: ${EXTERNAL_OIDC_IDPS:-}
      TF_VAR_app_redirect_uris: ${APP_REDIRECT_URIS:-[]}
      TF_VAR_demo_user_password: ${DEMO_USER_PASSWORD:-}
    volumes:
      - machinekey:/data/machinekey:ro
      - tfstate:/tfstate
    depends_on:
      zitadel:
        condition: service_started
    networks:
      - local
      - proxy

  # ── Directory-sync (Entra Graph delta -> Zitadel) ───────────────────────────
  directory-sync:
    image: ${DIRECTORY_SYNC_IMAGE:-ghcr.io/bauer-group/cs-iam/directory-sync}:${DIRECTORY_SYNC_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_SYNC
    restart: unless-stopped
    # Run with Zitadel's gid (1000) so the group-private (0750) machine-key dir
    # is readable; uid 1001 still owns /data.
    user: "1001:1000"
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      ZITADEL_DOMAIN: ${IAM_HOSTNAME}
      ZITADEL_PORT: 443
      ZITADEL_INSECURE: "false"
      ZITADEL_JWT_PROFILE_FILE: /data/machinekey/iam-admin.json
      ZITADEL_WAIT_TIMEOUT: ${SYNC_WAIT_TIMEOUT:-180}
      SYNC_ENABLED: ${SYNC_ENABLED:-true}
      SYNC_PROFILES_INTERVAL: ${SYNC_PROFILES_INTERVAL:-300}
      SYNC_GROUPS_INTERVAL: ${SYNC_GROUPS_INTERVAL:-600}
      SYNC_ROLE_PREFIX: ${SYNC_ROLE_PREFIX:-entra:}
      SYNC_PROJECT_NAME: ${SYNC_PROJECT_NAME:-BAUER GROUP}
      SYNC_LOG_LEVEL: ${SYNC_LOG_LEVEL:-INFO}
      SYNC_LOG_FORMAT: ${SYNC_LOG_FORMAT:-console}
    volumes:
      - sync-data:/data
      - machinekey:/data/machinekey:ro
    depends_on:
      provisioner:
        condition: service_completed_successfully
    networks:
      - local
      - proxy

  # ── Login branding (one-shot: upload logo/icon/font to the LabelPolicy) ─────
  # Runs `brand` once after provisioning: pushes the baked-in logo/icon/font to
  # the instance LabelPolicy via the Assets API and activates it (colours come
  # from the baked DefaultInstance config). Idempotent; exits on completion.
  zitadel-brand:
    image: ${DIRECTORY_SYNC_IMAGE:-ghcr.io/bauer-group/cs-iam/directory-sync}:${DIRECTORY_SYNC_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_BRAND
    restart: "no"
    command: ["brand"]
    user: "1001:1000"
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      ZITADEL_DOMAIN: ${IAM_HOSTNAME}
      ZITADEL_PORT: 443
      ZITADEL_INSECURE: "false"
      ZITADEL_JWT_PROFILE_FILE: /data/machinekey/iam-admin.json
      ZITADEL_WAIT_TIMEOUT: ${SYNC_WAIT_TIMEOUT:-180}
      BRANDING_ENABLED: ${BRANDING_ENABLED:-true}
      SYNC_LOG_FORMAT: ${SYNC_LOG_FORMAT:-console}
    volumes:
      - machinekey:/data/machinekey:ro
    depends_on:
      provisioner:
        condition: service_completed_successfully
    networks:
      - local
      - proxy

  # ── Database backup (pg_dump, opt-in via --profile backup) ──────────────────
  database-backup:
    image: ${DATABASE_BACKUP_IMAGE:-ghcr.io/bauer-group/cs-iam/database-backup}:${DATABASE_BACKUP_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_BACKUP
    profiles: ["backup"]
    restart: unless-stopped
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      INSTANCE_NAME: ${STACK_NAME:-iam}
      DB_HOST: database-server
      DB_PORT: 5432
      DB_NAME: ${ZITADEL_DB_NAME:-zitadel}
      DB_USER: ${ZITADEL_DB_USER:-zitadel}
      DB_PASSWORD: ${ZITADEL_DB_PASSWORD}
      DB_SSL_MODE: disable
      # Optional off-site S3 target (leave blank for local-only)
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-eu-central-1}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-iam/}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-14}
      BACKUP_SCHEDULE_ENABLED: ${BACKUP_SCHEDULE_ENABLED:-true}
      BACKUP_SCHEDULE_MODE: ${BACKUP_SCHEDULE_MODE:-cron}
      BACKUP_SCHEDULE_CRON: ${BACKUP_SCHEDULE_CRON:-15 3 * * *}
      ALERT_ENABLED: ${BACKUP_ALERT_ENABLED:-false}
      ALERT_LEVEL: ${BACKUP_ALERT_LEVEL:-warnings}
      ALERT_CHANNELS: ${BACKUP_ALERT_CHANNELS:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM_EMAIL:-}
      SMTP_TO: ${BACKUP_ALERT_EMAIL:-}
      TEAMS_WEBHOOK_URL: ${BACKUP_TEAMS_WEBHOOK:-}
      BACKUP_LOG_LEVEL: ${BACKUP_LOG_LEVEL:-INFO}
    volumes:
      - backup-data:/data
    depends_on:
      database-server:
        condition: service_healthy
    networks:
      - local


### Volumes ###
volumes:
  database-data:
    driver: local
    name: ${STACK_NAME:-iam}-database
  machinekey:
    driver: local
    name: ${STACK_NAME:-iam}-machinekey
  tfstate:
    driver: local
    name: ${STACK_NAME:-iam}-tfstate
  sync-data:
    driver: local
    name: ${STACK_NAME:-iam}-sync
  backup-data:
    driver: local
    name: ${STACK_NAME:-iam}-backup


### Networks ###
networks:
  local:
    driver: bridge
    name: ${STACK_NAME:-iam}
    enable_ipv6: true
  proxy:
    name: ${PROXY_NETWORK:-EDGEPROXY}
    external: true
