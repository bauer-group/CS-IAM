# =============================================================================
# CS-IAM — Zitadel OIDC/IAM Stack — Production (Traefik reverse proxy)
# =============================================================================
#   docker compose -f docker-compose.traefik.yml up -d
#
# Prerequisites:
#   - Traefik v2/v3 on the external ${PROXY_NETWORK} network
#   - DNS: ${IAM_HOSTNAME} → this server
#
# Zitadel speaks HTTP/2 cleartext (h2c) internally → the Traefik service MUST
# use `loadbalancer.server.scheme=h2c` or every request returns 502.
#
# Automation (zitadel-provision, zitadel-sync) reaches Zitadel at its PUBLIC
# issuer URL https://${IAM_HOSTNAME} (through Traefik) so the OIDC issuer / JWT
# audience match — they join the proxy network for that. The host must resolve
# ${IAM_HOSTNAME} (public DNS).
# =============================================================================

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

services:
  # ── PostgreSQL 18 ──────────────────────────────────────────────────────────
  zitadel-db:
    image: ${POSTGRES_IMAGE:-postgres}:${POSTGRES_VERSION:-18-alpine}
    container_name: ${STACK_NAME:-iam}_DB
    hostname: zitadel-db
    restart: unless-stopped
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      POSTGRES_DB: ${ZITADEL_DB_NAME:-zitadel}
      POSTGRES_USER: ${ZITADEL_DB_USER:-zitadel}
      POSTGRES_PASSWORD: ${ZITADEL_DB_PASSWORD:?Set ZITADEL_DB_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command: >
      -c max_connections=${PG_MAX_CONNECTIONS:-100}
      -c shared_buffers=${PG_SHARED_BUFFERS:-512MB}
      -c work_mem=${PG_WORK_MEM:-4MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-1536MB}
      -c maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-128MB}
      -c max_wal_size=${PG_MAX_WAL_SIZE:-1GB}
      -c min_wal_size=${PG_MIN_WAL_SIZE:-256MB}
    volumes:
      - zitadel-db-data:/var/lib/postgresql
    expose:
      - 5432/tcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ZITADEL_DB_USER:-zitadel} -d ${ZITADEL_DB_NAME:-zitadel}"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - local

  # ── Zitadel (OIDC broker, behind Traefik, h2c) ─────────────────────────────
  zitadel:
    image: ${ZITADEL_IMAGE:-ghcr.io/bauer-group/cs-iam/zitadel}:${ZITADEL_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_APP
    hostname: zitadel
    restart: unless-stopped
    <<: *logging
    command: >
      start-from-init
      --masterkey "${ZITADEL_MASTERKEY:?Set ZITADEL_MASTERKEY in .env}"
      --config /zitadel/config/defaults.yaml
      --steps /zitadel/config/steps.yaml
      --tlsMode external
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DB_NAME:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${ZITADEL_DB_USER:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${ZITADEL_DB_USER:-zitadel}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: ${IAM_HOSTNAME:?Set IAM_HOSTNAME in .env}
      ZITADEL_EXTERNALPORT: 443
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:?Set ZITADEL_ADMIN_PASSWORD in .env}
    volumes:
      - ./config/zitadel/defaults.yaml:/zitadel/config/defaults.yaml:ro
      - ./config/zitadel/steps.yaml:/zitadel/config/steps.yaml:ro
      - machinekey:/machinekey
    depends_on:
      zitadel-db:
        condition: service_healthy
    networks:
      - local
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK:-EDGEPROXY}"
      # Shared HTTP→HTTPS redirect
      - "traefik.http.middlewares.${STACK_NAME:-iam}-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.${STACK_NAME:-iam}-redirect.redirectscheme.permanent=true"
      # HTTP router (redirect)
      - "traefik.http.routers.${STACK_NAME:-iam}-app-http.rule=Host(`${IAM_HOSTNAME}`)"
      - "traefik.http.routers.${STACK_NAME:-iam}-app-http.entrypoints=web"
      - "traefik.http.routers.${STACK_NAME:-iam}-app-http.middlewares=${STACK_NAME:-iam}-redirect"
      # HTTPS router
      - "traefik.http.routers.${STACK_NAME:-iam}-app.rule=Host(`${IAM_HOSTNAME}`)"
      - "traefik.http.routers.${STACK_NAME:-iam}-app.entrypoints=websecure"
      - "traefik.http.routers.${STACK_NAME:-iam}-app.tls=true"
      - "traefik.http.routers.${STACK_NAME:-iam}-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${STACK_NAME:-iam}-app.service=${STACK_NAME:-iam}-app"
      # h2c — Zitadel serves HTTP/2 cleartext; without this Traefik returns 502
      - "traefik.http.services.${STACK_NAME:-iam}-app.loadbalancer.server.port=8080"
      - "traefik.http.services.${STACK_NAME:-iam}-app.loadbalancer.server.scheme=h2c"

  # ── Provisioning (OpenTofu IaC, one-shot, non-destructive) ─────────────────
  zitadel-provision:
    image: ${PROVISION_IMAGE:-ghcr.io/bauer-group/cs-iam/zitadel-provision}:${PROVISION_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_PROVISION
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      ZITADEL_DOMAIN: ${IAM_HOSTNAME}
      ZITADEL_PORT: 443
      ZITADEL_INSECURE: "false"
      ZITADEL_JWT_PROFILE_FILE: /machinekey/iam-admin.json
      ZITADEL_WAIT_TIMEOUT: ${PROVISION_WAIT_TIMEOUT:-180}
      TF_VAR_zitadel_domain: ${IAM_HOSTNAME}
      TF_VAR_zitadel_port: 443
      TF_VAR_zitadel_insecure: "false"
      TF_VAR_role_prefix: ${SYNC_ROLE_PREFIX:-entra:}
      TF_VAR_azure_client_id: ${AZURE_CLIENT_ID:-}
      TF_VAR_azure_client_secret: ${AZURE_CLIENT_SECRET:-}
      TF_VAR_azure_tenant_id: ${AZURE_TENANT_ID:-}
      TF_VAR_app_redirect_uris: ${APP_REDIRECT_URIS:-[]}
    volumes:
      - machinekey:/machinekey:ro
      - tfstate:/tfstate
    depends_on:
      zitadel:
        condition: service_started
    networks:
      - local
      - proxy

  # ── Directory-sync (Graph delta → Zitadel) ─────────────────────────────────
  zitadel-sync:
    image: ${SYNC_IMAGE:-ghcr.io/bauer-group/cs-iam/zitadel-sync}:${SYNC_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_SYNC
    restart: unless-stopped
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      ZITADEL_DOMAIN: ${IAM_HOSTNAME}
      ZITADEL_PORT: 443
      ZITADEL_INSECURE: "false"
      ZITADEL_JWT_PROFILE_FILE: /machinekey/iam-admin.json
      ZITADEL_WAIT_TIMEOUT: ${SYNC_WAIT_TIMEOUT:-180}
      SYNC_ENABLED: ${SYNC_ENABLED:-true}
      SYNC_PROFILES_INTERVAL: ${SYNC_PROFILES_INTERVAL:-300}
      SYNC_GROUPS_INTERVAL: ${SYNC_GROUPS_INTERVAL:-600}
      SYNC_ROLE_PREFIX: ${SYNC_ROLE_PREFIX:-entra:}
      SYNC_PROJECT_NAME: ${SYNC_PROJECT_NAME:-BAUER GROUP}
      SYNC_LOG_LEVEL: ${SYNC_LOG_LEVEL:-INFO}
      SYNC_LOG_FORMAT: ${SYNC_LOG_FORMAT:-console}
    volumes:
      - machinekey:/machinekey:ro
      - sync-state:/data
    depends_on:
      zitadel-provision:
        condition: service_completed_successfully
    networks:
      - local
      - proxy

  # ── Backup (pg_dump, opt-in via --profile backup) ──────────────────────────
  zitadel-backup:
    image: ${BACKUP_IMAGE:-ghcr.io/bauer-group/cs-iam/zitadel-backup}:${BACKUP_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_BACKUP
    profiles: ["backup"]
    restart: unless-stopped
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      INSTANCE_NAME: ${STACK_NAME:-iam}
      DB_HOST: zitadel-db
      DB_PORT: 5432
      DB_NAME: ${ZITADEL_DB_NAME:-zitadel}
      DB_USER: ${ZITADEL_DB_USER:-zitadel}
      DB_PASSWORD: ${ZITADEL_DB_PASSWORD}
      DB_SSL_MODE: disable
      # Optional off-site S3 target (leave blank for local-only)
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-eu-central-1}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-iam/}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-14}
      BACKUP_SCHEDULE_ENABLED: ${BACKUP_SCHEDULE_ENABLED:-true}
      BACKUP_SCHEDULE_MODE: ${BACKUP_SCHEDULE_MODE:-cron}
      BACKUP_SCHEDULE_CRON: ${BACKUP_SCHEDULE_CRON:-15 3 * * *}
      ALERT_ENABLED: ${BACKUP_ALERT_ENABLED:-false}
      ALERT_LEVEL: ${BACKUP_ALERT_LEVEL:-warnings}
      ALERT_CHANNELS: ${BACKUP_ALERT_CHANNELS:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM_EMAIL:-}
      SMTP_TO: ${BACKUP_ALERT_EMAIL:-}
      TEAMS_WEBHOOK_URL: ${BACKUP_TEAMS_WEBHOOK:-}
      BACKUP_LOG_LEVEL: ${BACKUP_LOG_LEVEL:-INFO}
    volumes:
      - backup-data:/data
    depends_on:
      zitadel-db:
        condition: service_healthy
    networks:
      - local

volumes:
  zitadel-db-data:
    name: ${STACK_NAME:-iam}-db
  machinekey:
    name: ${STACK_NAME:-iam}-machinekey
  tfstate:
    name: ${STACK_NAME:-iam}-tfstate
  sync-state:
    name: ${STACK_NAME:-iam}-sync
  backup-data:
    name: ${STACK_NAME:-iam}-backup

networks:
  local:
    driver: bridge
    name: ${STACK_NAME:-iam}
    enable_ipv6: true
  proxy:
    name: ${PROXY_NETWORK:-EDGEPROXY}
    external: true
