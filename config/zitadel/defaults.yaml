# =============================================================================
# Zitadel — DefaultInstance configuration (BAUER GROUP)
# =============================================================================
# Passed to Zitadel via `--config`. Holds the *template* applied to the first
# instance: policies, branding, token lifetimes. It is SECRET-FREE and
# committed as-is — every secret and instance-specific value (external domain,
# DB password, masterkey, admin password) is injected at runtime via
# ZITADEL_* environment variables, which override anything in this file.
#
# This file deliberately contains ONLY what Zitadel can express declaratively
# in DefaultInstance. Identity Providers, Projects, Applications, Roles and
# Grants are NOT expressible here — they are managed by Terraform
# (see ../../terraform/). FirstInstance (org/admin/machine SA) lives in
# steps.yaml and is passed via `--steps`.
#
# Viper ignores unknown keys, so version drift in optional fields is harmless.
# Reference: https://github.com/zitadel/zitadel/blob/main/cmd/defaults.yaml
# =============================================================================

DefaultInstance:
  # ── Login policy ─────────────────────────────────────────────────────────
  # Goal (b)+(i): local accounts AND external IdP coexist. Federated users are
  # created WITHOUT a password (see directory-sync / Terraform), so in practice
  # only genuine local accounts can use the password form. MFA is enforced for
  # local logins only — Entra handles MFA for federated logins.
  LoginPolicy:
    AllowUsernamePassword: true
    AllowRegister: false # no self-registration; users come from Entra or are created by an admin
    AllowExternalIDP: true
    ForceMFA: false
    ForceMFALocalOnly: true # MFA required for local (non-IdP) logins only
    HidePasswordReset: false
    IgnoreUnknownUsernames: true # don't reveal whether a username exists
    AllowDomainDiscovery: true # route corporate-domain users to their IdP
    DisableLoginWithEmail: false
    DisableLoginWithPhone: true
    DefaultRedirectURI: "" # set per-instance via env if a global landing page is wanted
    # Session/SSO lifetimes — generous (Microsoft-like) so users don't re-auth
    # constantly across many apps. With SSO one password+MFA check covers every
    # app for the lifetime below; these control when a *re-check* is forced.
    PasswordCheckLifetime: 2160h        # 90d — primary SSO duration
    ExternalLoginCheckLifetime: 2160h   # 90d — same for IdP logins
    MFAInitSkipLifetime: 2160h          # 90d — grace before MFA setup is enforced
    SecondFactorCheckLifetime: 720h     # 30d — re-prompt 2FA monthly
    MultiFactorCheckLifetime: 720h      # 30d
    # Second/Multi factor catalogues (verify enum values against the installed
    # Zitadel version; unknown values are ignored). 1=OTP(TOTP) 2=U2F 6=OTPEmail 7=OTPSMS
    SecondFactors:
      - 1
      - 2
    MultiFactors:
      - 1 # U2F with user verification (passkeys)
    PasswordlessType: 1 # 1 = passkeys/passwordless allowed

  # ── Password complexity (local accounts) ─────────────────────────────────
  PasswordComplexityPolicy:
    MinLength: 12
    HasUppercase: true
    HasLowercase: true
    HasNumber: true
    HasSymbol: true

  # ── Lockout ───────────────────────────────────────────────────────────────
  LockoutPolicy:
    MaxPasswordAttempts: 5
    MaxOTPAttempts: 5

  # ── Domain handling ────────────────────────────────────────────────────────
  # Loginname = the user's verbatim username, i.e. their real email
  # (admin@bauer-group.com, jdoe@de.bauer-group.com) — the Microsoft UPN model.
  # The org owns MULTIPLE verified domains (bauer-group.com, de.bauer-group.com,
  # us.bauer-group.com, …) used for **domain discovery**: any @*.bauer-group.com
  # login is routed to the single Entra IdP. These domains are NOT used to build
  # the loginname (that is why UserLoginMustBeDomain stays false) — they only
  # drive routing. Tenant isolation is at the ORG level, independent of this flag.
  DomainPolicy:
    UserLoginMustBeDomain: false
    # No DNS/HTTP ownership challenge for org domains. We have NO process to place
    # verification DNS records, and we don't need one: every org + domain in this
    # instance is created by us via Terraform / FirstInstance — there is no
    # self-service org registration (AllowRegister=false), so no untrusted party
    # could ever claim a domain. With false, the domains in INTERNAL_ORG_DOMAINS
    # are treated as verified the moment Terraform adds them and are immediately
    # usable for domain discovery. (They must still be verified domains on the
    # Entra side — that is Microsoft's tenant config, not ours to prove here.)
    # Zitadel docs explicitly sanction false for self-hosted instances that don't
    # require strict validation.
    ValidateOrgDomains: false
    SMTPSenderAddressMatchesInstanceDomain: false

  # ── Privacy / support links (shown in the login UI) ────────────────────────
  PrivacyPolicy:
    TOSLink: ""
    PrivacyLink: "https://go.bauer-group.com/privacypolicy"
    HelpLink: "https://go.bauer-group.com/iam-help"
    SupportEmail: "support@bauer-group.com"

  # ── Branding ───────────────────────────────────────────────────────────────
  # Minimal brand tokens; full logos are uploaded via the console/Terraform.
  # BAUER GROUP brand palette — orange primary (#FF8500) on warm neutrals.
  # Logo/icon/font are binary assets uploaded via the Assets API (not URLs here)
  # — see the branding step in docs/branding-and-login.md.
  LabelPolicy:
    PrimaryColor: "#FF8500"        # orange-500 — brand primary
    BackgroundColor: "#FFFFFF"     # bg-primary
    WarnColor: "#EF4444"           # error-500
    FontColor: "#231F1C"           # warm-900 — brand black (text-primary)
    PrimaryColorDark: "#FB923C"    # orange-400 — brighter primary on dark
    BackgroundColorDark: "#231F1C" # warm-900 — brand black
    WarnColorDark: "#EF4444"       # error-500
    FontColorDark: "#F9F8F6"       # warm-50 — brand light
    HideLoginNameSuffix: false
    DisableWatermark: true
    ThemeMode: 0 # 0=auto, 1=light, 2=dark

  # ── OIDC token lifetimes ───────────────────────────────────────────────────
  OIDCSettings:
    AccessTokenLifetime: 12h
    IdTokenLifetime: 12h
    RefreshTokenIdleExpiration: 720h # 30d
    RefreshTokenExpiration: 2160h # 90d

  # ── Notification text defaults inherit from Zitadel; SMTP is injected via
  #    ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_* env when an MTA is wired.
