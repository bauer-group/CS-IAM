# =============================================================================
# CS-IAM — Zitadel OIDC/IAM Stack — Development Mode (local builds)
# =============================================================================
# Usage: docker compose -f docker-compose.development.yml up -d --build
#
# Builds the custom images locally from src/ instead of pulling from GHCR, and
# runs on plain HTTP. The OpenTofu provisioner applies the IdPs/projects/apps,
# and the directory-sync sidecar keeps profiles/groups fresh from Entra.
#
# Access (add `127.0.0.1 ${IAM_DEV_HOSTNAME:-iam.example.test}` to your hosts file first):
#   - Console / Issuer   https://${IAM_DEV_HOSTNAME:-iam.example.test}:${IAM_DEV_PORT:-8080}/ui/console
#   - Login              the org loginname (e.g. admin@bauer-group.zitadel) /
#                        ${ZITADEL_ADMIN_PASSWORD}
# A Traefik `proxy` terminates TLS (self-signed) and fronts :${IAM_DEV_PORT:-8080},
# path-routing /ui/v2/login to the login container and everything else to the
# core (h2c) — one HTTPS origin, like prod. HTTPS is required: the Login v2
# session cookie is `Secure`, so plain HTTP drops it mid-login. Accept the
# self-signed cert once in your browser. Core and login are not published directly.
#
# Bootstrap order:
#   database-server (healthy) -> zitadel (writes the machine key) ->
#   provisioner (tofu apply) -> directory-sync.
# zitadel has no in-container healthcheck (distroless image, no shell), so the
# dependent containers poll readiness + the machine-key file themselves.
# =============================================================================


### Service Templates ###

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "25m"
      max-file: "3"


services:

  # ── Reverse proxy (Traefik) — single HTTPS dev origin for core + login ──────
  # The Login v2 (a) derives asset/cookie/issuer URLs from the request host and
  # (b) sets its session cookie with `Secure` (baked into the production image),
  # so the browser only keeps it over HTTPS. This proxy terminates TLS with a
  # self-signed cert and serves ONE origin (https://${IAM_DEV_HOSTNAME}:${IAM_DEV_PORT}),
  # path-routing `/ui/v2/login` -> login and everything else -> core (h2c) —
  # exactly how Traefik/Coolify route in prod. Browse via the
  # `127.0.0.1 ${IAM_DEV_HOSTNAME}` hosts entry and accept the cert once.
  proxy:
    image: ${TRAEFIK_IMAGE:-traefik}:${TRAEFIK_VERSION:-v3.6.8}
    container_name: ${STACK_NAME:-iam}_PROXY
    restart: unless-stopped
    <<: *logging
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${STACK_NAME:-iam}
      - --providers.file.filename=/etc/traefik/dynamic/tls.yml
      - --entrypoints.web.address=:8080
      - --entrypoints.web.http.tls=true
      - --entrypoints.ping.address=:8081
      - --ping=true
      - --ping.entrypoint=ping
      - --log.level=${TRAEFIK_LOG_LEVEL:-ERROR}
    ports:
      - "${IAM_DEV_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/certs:ro
      - ./config/traefik/tls.yml:/etc/traefik/dynamic/tls.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # The proxy must come up EARLY — the provisioner/brand/sync reach the core
    # through its network alias, and `login` now starts only AFTER provisioning +
    # branding (see the login service). Depending on `login` here would deadlock
    # (proxy→login→brand→provisioner→proxy). Traefik discovers `login` dynamically
    # via the docker provider, so it needs no startup dependency on it.
    depends_on:
      prepare-cert:
        condition: service_completed_successfully
      zitadel:
        condition: service_started
    networks:
      local:
        # The instance domain resolves to the PROXY inside the network too, so the
        # automation containers (provisioner/sync/brand) reach the core over the
        # SAME https origin as the issuer — the JWT-profile audience matches. They
        # trust the self-signed cert via SSL_CERT_FILE/CURL_CA_BUNDLE.
        aliases:
          - ${IAM_DEV_HOSTNAME:-iam.example.test}

  # ── Generate a self-signed dev cert (once) for the HTTPS proxy origin ───────
  # Idempotent: writes /certs/local.{crt,key} for `zitadel` into the `certs`
  # volume only if absent. Browsers show a one-time warning — accept it.
  # Regenerate by removing the `certs` volume.
  prepare-cert:
    image: ${ALPINE_IMAGE:-alpine}:${ALPINE_VERSION:-3.23}
    container_name: ${STACK_NAME:-iam}_CERT
    restart: "no"
    command:
      - sh
      - -c
      - |
        test -f /certs/local.crt && exit 0
        apk add --no-cache openssl
        openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
          -keyout /certs/local.key -out /certs/local.crt \
          -subj "/CN=${IAM_DEV_HOSTNAME:-iam.example.test}" \
          -addext "subjectAltName=DNS:${IAM_DEV_HOSTNAME:-iam.example.test},DNS:localhost,IP:127.0.0.1"
        chmod 0644 /certs/local.crt /certs/local.key
    volumes:
      - certs:/certs
    networks:
      - local

  # ── Prepare the shared machine-key volume ───────────────────────────────────
  # Fresh named volumes are root:root, but Zitadel runs as the non-root
  # `zitadel` user (uid 1000) and must write the FirstInstance machine key into
  # /data/machinekey. Own the volume to Zitadel and keep it group-private (0750 —
  # not world-writable or world-readable). The root `provisioner` reads it
  # directly; `directory-sync` runs with gid 1000 (user: "1001:1000") to read it.
  prepare-machinekey:
    image: ${ALPINE_IMAGE:-alpine}:${ALPINE_VERSION:-3.23}
    container_name: ${STACK_NAME:-iam}_PREP
    restart: "no"
    command: ["sh", "-c", "chown 1000:1000 /data/machinekey && chmod 0750 /data/machinekey"]
    volumes:
      - machinekey:/data/machinekey
    networks:
      - local

  # ── PostgreSQL 18 ───────────────────────────────────────────────────────────
  # Tuned for SSD/NVMe by default. For HDD set PG_RANDOM_PAGE_COST=2.0 (10k RPM)
  # or 4.0 (7.2k RPM) and PG_EFFECTIVE_IO_CONCURRENCY=4/2 in .env. Memory + WAL
  # presets for 4/8/16/32 GB hosts are documented in .env.example.
  database-server:
    image: ${POSTGRES_IMAGE:-postgres}:${POSTGRES_VERSION:-18-alpine}
    container_name: ${STACK_NAME:-iam}_DATABASE
    hostname: database-server
    restart: unless-stopped
    <<: *logging
    command: >
      -c max_connections=${PG_MAX_CONNECTIONS:-100}
      -c shared_buffers=${PG_SHARED_BUFFERS:-1GB}
      -c work_mem=${PG_WORK_MEM:-4MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-3GB}
      -c maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-128MB}
      -c max_wal_size=${PG_MAX_WAL_SIZE:-1GB}
      -c min_wal_size=${PG_MIN_WAL_SIZE:-256MB}
      -c random_page_cost=${PG_RANDOM_PAGE_COST:-1.1}
      -c seq_page_cost=1.0
      -c effective_io_concurrency=${PG_EFFECTIVE_IO_CONCURRENCY:-200}
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_parallel_maintenance_workers=2
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    environment:
      - TZ=${TIME_ZONE:-Etc/UTC}
      - PGTZ=${TIME_ZONE:-Etc/UTC}
      - POSTGRES_DB=${ZITADEL_DB_NAME:-zitadel}
      - POSTGRES_USER=${ZITADEL_DB_USER:-zitadel}
      - POSTGRES_PASSWORD=${ZITADEL_DB_PASSWORD:?Set ZITADEL_DB_PASSWORD in .env}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    volumes:
      - database-data:/var/lib/postgresql
    expose:
      - 5432/tcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ZITADEL_DB_USER:-zitadel} -d ${ZITADEL_DB_NAME:-zitadel}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - local

  # ── Zitadel (OIDC broker) ───────────────────────────────────────────────────
  zitadel:
    image: ${ZITADEL_IMAGE:-ghcr.io/bauer-group/cs-iam/zitadel}:${ZITADEL_VERSION:-latest}
    build:
      # Repo-root context so the wrapper can bake config/zitadel/*.yaml in.
      context: .
      dockerfile: ./src/zitadel/Dockerfile
    container_name: ${STACK_NAME:-iam}_APP
    hostname: zitadel
    restart: unless-stopped
    <<: *logging
    command: >
      start-from-init
      --masterkey "${ZITADEL_MASTERKEY:?Set ZITADEL_MASTERKEY in .env}"
      --config /zitadel/config/defaults.yaml
      --steps /zitadel/config/steps.yaml
      --tlsMode external
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      # Database connection
      ZITADEL_DATABASE_POSTGRES_HOST: database-server
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DB_NAME:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${ZITADEL_DB_USER:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${ZITADEL_DB_USER:-zitadel}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # External access — the public dev origin is https://${IAM_DEV_HOSTNAME}:
      # ${IAM_DEV_PORT}, served by the `proxy` (TLS termination). ExternalSecure
      # is true so the issuer is https (required: the Login v2 cookie is `Secure`,
      # so the whole flow must run over HTTPS). The core itself stays plain-http
      # behind the proxy (`--tlsMode external` — TLS terminated by the proxy, so
      # the core serves plain http but generates https URLs); the automation reach
      # it directly via Docker DNS (`zitadel:8080`) and the issuer/JWT audience
      # still match. (`*.localhost` can't be used: musl/glibc force it to
      # 127.0.0.1 inside every container.) For browser access add
      # `127.0.0.1 zitadel` to your hosts file and open https://zitadel:8080.
      ZITADEL_EXTERNALDOMAIN: ${IAM_DEV_HOSTNAME:-iam.example.test}
      ZITADEL_EXTERNALPORT: ${IAM_DEV_PORT:-8080}
      ZITADEL_EXTERNALSECURE: "true"
      # TOTP/MFA issuer label shown in authenticator apps (default is "ZITADEL").
      ZITADEL_SYSTEMDEFAULTS_MULTIFACTORS_OTP_ISSUER: "BAUER GROUP"
      # SMTP — INSTANCE-WIDE (one MTA for all orgs). Dev catches every mail in
      # Mailpit (web UI http://localhost:${MAILPIT_UI_PORT:-8025}); no real send.
      # DefaultInstance config (applied on a fresh instance), so notifications
      # (verify, password reset, OTP-email) actually work.
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_HOST: ${DEV_SMTP_HOST:-mailpit:1025}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_USER: ${DEV_SMTP_USER:-}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_PASSWORD: ${DEV_SMTP_PASSWORD:-}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_TLS: ${DEV_SMTP_TLS:-false}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROM: ${SMTP_FROM_EMAIL:-no-reply@example.com}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROMNAME: ${SMTP_FROM_NAME:-BAUER GROUP IAM}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:?Set ZITADEL_ADMIN_PASSWORD in .env}
      # Dedicated login-client machine user (IAM_LOGIN_CLIENT role) for the
      # Login v2 — the session/MFA APIs require it; an IAM_OWNER admin PAT is
      # rejected (AUTH-AWfge). FirstInstance creates it and writes its PAT to the
      # shared machinekey volume; the `login` service reads it.
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Login v2 client
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /data/machinekey/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2100-01-01T00:00:00Z"
      # Login v2 — the `proxy` serves the core and the login under ONE HTTPS
      # origin; `/ui/v2/login` routes to the login, everything else to the core.
      # All four URLs are on that single origin so cookies/assets/issuer stay
      # consistent: BASEURI (where login lives), LOGINURLV2 / LOGOUTURLV2 (OIDC
      # auth + RP-logout), SAML login. Port = the core's, not the login's 3000.
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: https://${IAM_DEV_HOSTNAME:-iam.example.test}:${IAM_DEV_PORT:-8080}/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: https://${IAM_DEV_HOSTNAME:-iam.example.test}:${IAM_DEV_PORT:-8080}/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: https://${IAM_DEV_HOSTNAME:-iam.example.test}:${IAM_DEV_PORT:-8080}/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: https://${IAM_DEV_HOSTNAME:-iam.example.test}:${IAM_DEV_PORT:-8080}/ui/v2/login/login?samlRequest=
    volumes:
      # Config is also baked into the image, but mount the host files in dev so
      # FirstInstance/DefaultInstance changes apply on a fresh instance without
      # rebuilding (a fresh instance = `down -v` then `up`).
      - ./config/zitadel/defaults.yaml:/zitadel/config/defaults.yaml:ro
      - ./config/zitadel/steps.yaml:/zitadel/config/steps.yaml:ro
      - machinekey:/data/machinekey
    # No host port — the `proxy` publishes :${IAM_DEV_PORT} and path-routes to
    # the core (everything except /ui/v2/login) and the login.
    expose:
      - "8080"
    depends_on:
      database-server:
        condition: service_healthy
      prepare-machinekey:
        condition: service_completed_successfully
    networks:
      - local
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${STACK_NAME:-iam}"
      - "traefik.http.services.cs-core.loadbalancer.server.port=8080"
      - "traefik.http.services.cs-core.loadbalancer.server.scheme=h2c"
      - "traefik.http.routers.cs-core.rule=Host(`${IAM_DEV_HOSTNAME:-iam.example.test}`) && !PathPrefix(`/ui/v2/login`)"
      - "traefik.http.routers.cs-core.entrypoints=web"
      - "traefik.http.routers.cs-core.service=cs-core"
      - "traefik.http.routers.cs-core.priority=100"

  # ── Login v2 (official hosted login UI; branded via LabelPolicy + theme) ────
  # Waits for the machine-key PAT to appear, then serves the login at
  # /ui/v2/login. Runs with gid 1000 to read the group-private PAT (0750 dir).
  login:
    image: ${LOGIN_IMAGE:-ghcr.io/bauer-group/cs-iam/login}:${LOGIN_VERSION:-latest}
    build:
      context: ./src/login
      args:
        LOGIN_BASE_IMAGE: ${LOGIN_BASE_IMAGE:-ghcr.io/bauer-group/ep-zitadel/zitadel-login}
        LOGIN_BASE_VERSION: ${LOGIN_BASE_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_LOGIN
    restart: unless-stopped
    user: "1000:1000"
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      # Internal API URL (Docker DNS) — server-side login->core calls.
      ZITADEL_API_URL: http://zitadel:8080
      # Pin the instance/issuer on every login->core call to the public proxy
      # origin (same mechanism as prod's `Host:${IAM_HOSTNAME}`). The port is
      # required in dev (ExternalPort 8080 is non-standard) so the core derives
      # the issuer as `https://zitadel:8080`, matching the browser. X-Forwarded-
      # Proto keeps the scheme https end-to-end behind the TLS proxy.
      CUSTOM_REQUEST_HEADERS: "Host:${IAM_DEV_HOSTNAME:-iam.example.test}:${IAM_DEV_PORT:-8080},X-Forwarded-Proto:https"
      # The dedicated login-client PAT (IAM_LOGIN_CLIENT) — NOT the iam-admin
      # PAT, which lacks the session/MFA permissions the Login v2 needs.
      ZITADEL_SERVICE_USER_TOKEN_FILE: /data/machinekey/login-client.pat
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      # Branding is RUNTIME (Zitadel LabelPolicy): the page logo (LabelPolicy
      # logo) and the browser favicon (LabelPolicy icon, via the base image's
      # feature/favicon-from-branding). The centred switcher + per-IdP logos are
      # baked in the base image (EP-Zitadel feature branches -> production,
      # pinned via LOGIN_BASE_VERSION). No login background image by design.
      NEXT_PUBLIC_THEME_LAYOUT: ${LOGIN_THEME_LAYOUT:-top-to-bottom}
      NEXT_PUBLIC_THEME_ROUNDNESS: ${LOGIN_THEME_ROUNDNESS:-mid}
      NEXT_PUBLIC_THEME_SPACING: ${LOGIN_THEME_SPACING:-regular}
      NEXT_PUBLIC_THEME_APPEARANCE: ${LOGIN_THEME_APPEARANCE:-material}
    volumes:
      - machinekey:/data/machinekey:ro
    # No host port — the `proxy` path-routes /ui/v2/login to this container.
    expose:
      - "3000"
    depends_on:
      zitadel:
        condition: service_started
      # Wait for the branding job to finish BEFORE the login starts: the login
      # caches getBrandingSettings with a long TTL, so its first fetch must see
      # the already-uploaded logo/colors — otherwise it caches empty branding and
      # serves a logo-less page until the TTL expires (or a manual restart).
      zitadel-brand:
        condition: service_completed_successfully
    networks:
      - local
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${STACK_NAME:-iam}"
      - "traefik.http.services.cs-login.loadbalancer.server.port=3000"
      - "traefik.http.routers.cs-login.rule=Host(`${IAM_DEV_HOSTNAME:-iam.example.test}`) && PathPrefix(`/ui/v2/login`)"
      - "traefik.http.routers.cs-login.entrypoints=web"
      - "traefik.http.routers.cs-login.service=cs-login"
      - "traefik.http.routers.cs-login.priority=250"

  # ── Provisioner (OpenTofu IaC, one-shot, non-destructive) ───────────────────
  provisioner:
    image: ${PROVISIONER_IMAGE:-ghcr.io/bauer-group/cs-iam/provisioner}:${PROVISIONER_VERSION:-latest}
    build:
      context: .
      dockerfile: ./src/provisioner/Dockerfile
    container_name: ${STACK_NAME:-iam}_PROVISIONER
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      ZITADEL_DOMAIN: ${IAM_DEV_HOSTNAME:-iam.example.test}
      ZITADEL_PORT: ${IAM_DEV_PORT:-8080}
      # Reach the core over HTTPS through the proxy (alias) so the issuer matches.
      # Trust the dev self-signed cert: SSL_CERT_FILE for the Go provider,
      # CURL_CA_BUNDLE for the readiness curl. (Prod uses a real cert — neither
      # var is set there.)
      ZITADEL_INSECURE: "false"
      SSL_CERT_FILE: /certs/local.crt
      CURL_CA_BUNDLE: /certs/local.crt
      ZITADEL_JWT_PROFILE_FILE: /data/machinekey/iam-admin.json
      ZITADEL_WAIT_TIMEOUT: ${PROVISIONER_WAIT_TIMEOUT:-120}
      TF_VAR_zitadel_domain: ${IAM_DEV_HOSTNAME:-iam.example.test}
      TF_VAR_zitadel_port: ${IAM_DEV_PORT:-8080}
      TF_VAR_zitadel_insecure: "false"
      TF_VAR_role_prefix: ${SYNC_ROLE_PREFIX:-entra:}
      TF_VAR_azure_client_id: ${AZURE_CLIENT_ID:-}
      TF_VAR_azure_client_secret: ${AZURE_CLIENT_SECRET:-}
      TF_VAR_azure_tenant_id: ${AZURE_TENANT_ID:-}
      TF_VAR_internal_org_domains: ${INTERNAL_ORG_DOMAINS:-[]}
      # External-org IdPs (customer login)
      TF_VAR_external_azure_client_id: ${EXTERNAL_AZURE_CLIENT_ID:-}
      TF_VAR_external_azure_client_secret: ${EXTERNAL_AZURE_CLIENT_SECRET:-}
      TF_VAR_external_google_client_id: ${EXTERNAL_GOOGLE_CLIENT_ID:-}
      TF_VAR_external_google_client_secret: ${EXTERNAL_GOOGLE_CLIENT_SECRET:-}
      TF_VAR_external_oauth_idps: ${EXTERNAL_OAUTH_IDPS:-}
      TF_VAR_external_oidc_idps: ${EXTERNAL_OIDC_IDPS:-}
      TF_VAR_app_redirect_uris: ${APP_REDIRECT_URIS:-[]}
      TF_VAR_demo_user_password: ${DEMO_USER_PASSWORD:-}
    volumes:
      - machinekey:/data/machinekey:ro
      - tfstate:/tfstate
      - certs:/certs:ro
    depends_on:
      zitadel:
        condition: service_started
      # The provisioner reaches the core over HTTPS via the proxy's network alias
      # (issuer match), so the proxy must be serving first. Explicit edge — the
      # old code relied on a 180s readiness retry winning the race.
      proxy:
        condition: service_healthy
    networks:
      - local

  # ── Directory-sync (Entra Graph delta -> Zitadel; default service) ──────────
  directory-sync:
    image: ${DIRECTORY_SYNC_IMAGE:-ghcr.io/bauer-group/cs-iam/directory-sync}:${DIRECTORY_SYNC_VERSION:-latest}
    build:
      context: ./src/directory-sync
      dockerfile: Dockerfile
    container_name: ${STACK_NAME:-iam}_SYNC
    restart: unless-stopped
    # Run with Zitadel's gid (1000) so the group-private (0750) machine-key dir
    # is readable; uid 1001 still owns /data.
    user: "1001:1000"
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      ZITADEL_DOMAIN: ${IAM_DEV_HOSTNAME:-iam.example.test}
      ZITADEL_PORT: ${IAM_DEV_PORT:-8080}
      # HTTPS via the proxy (alias) so the issuer matches; trust the dev
      # self-signed cert (httpx honours SSL_CERT_FILE).
      ZITADEL_INSECURE: "false"
      SSL_CERT_FILE: /certs/local.crt
      ZITADEL_JWT_PROFILE_FILE: /data/machinekey/iam-admin.json
      ZITADEL_WAIT_TIMEOUT: ${SYNC_WAIT_TIMEOUT:-180}
      SYNC_ENABLED: ${SYNC_ENABLED:-true}
      SYNC_PROFILES_INTERVAL: ${SYNC_PROFILES_INTERVAL:-300}
      SYNC_GROUPS_INTERVAL: ${SYNC_GROUPS_INTERVAL:-600}
      SYNC_ROLE_PREFIX: ${SYNC_ROLE_PREFIX:-entra:}
      SYNC_PROJECT_NAME: ${SYNC_PROJECT_NAME:-BAUER GROUP}
      SYNC_LOG_LEVEL: ${SYNC_LOG_LEVEL:-INFO}
      SYNC_LOG_FORMAT: ${SYNC_LOG_FORMAT:-console}
    volumes:
      - sync-data:/data
      - machinekey:/data/machinekey:ro
      - certs:/certs:ro
    depends_on:
      provisioner:
        condition: service_completed_successfully
    networks:
      - local

  # ── Login branding (one-shot: upload logo/icon/font to the LabelPolicy) ─────
  # Runs `brand` once after provisioning: pushes the baked-in logo/icon/font to
  # the instance LabelPolicy via the Assets API and activates it. Idempotent.
  zitadel-brand:
    image: ${DIRECTORY_SYNC_IMAGE:-ghcr.io/bauer-group/cs-iam/directory-sync}:${DIRECTORY_SYNC_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_BRAND
    restart: "no"
    command: ["brand"]
    user: "1001:1000"
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      ZITADEL_DOMAIN: ${IAM_DEV_HOSTNAME:-iam.example.test}
      ZITADEL_PORT: ${IAM_DEV_PORT:-8080}
      ZITADEL_INSECURE: "false"
      SSL_CERT_FILE: /certs/local.crt
      ZITADEL_JWT_PROFILE_FILE: /data/machinekey/iam-admin.json
      ZITADEL_WAIT_TIMEOUT: ${SYNC_WAIT_TIMEOUT:-180}
      BRANDING_ENABLED: ${BRANDING_ENABLED:-true}
      SYNC_LOG_FORMAT: ${SYNC_LOG_FORMAT:-console}
    volumes:
      - machinekey:/data/machinekey:ro
      - certs:/certs:ro
    depends_on:
      provisioner:
        condition: service_completed_successfully
    networks:
      - local

  # ── Database backup (pg_dump, opt-in via --profile backup) ──────────────────
  database-backup:
    image: ${DATABASE_BACKUP_IMAGE:-ghcr.io/bauer-group/cs-iam/database-backup}:${DATABASE_BACKUP_VERSION:-latest}
    build:
      context: ./src/database-backup
      dockerfile: Dockerfile
    container_name: ${STACK_NAME:-iam}_BACKUP
    profiles: ["backup"]
    restart: unless-stopped
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      BACKUP_LOG_LEVEL: ${BACKUP_LOG_LEVEL:-INFO}
      # Secrets resolved by the container (kept out of the rendered config)
      DB_PASSWORD: ${ZITADEL_DB_PASSWORD}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      WEBHOOK_SECRET: ${BACKUP_WEBHOOK_SECRET:-}
      BACKUP_CONFIG_JSON: |
        {
          "instance_name": "${STACK_NAME:-iam}",
          "jobs": [{
            "name": "main",
            "sources": [
              {"type": "postgres", "host": "database-server", "port": 5432,
               "database": "${ZITADEL_DB_NAME:-zitadel}", "user": "${ZITADEL_DB_USER:-zitadel}",
               "password": "$${DB_PASSWORD}", "ssl_mode": "disable", "dump_format": "custom"}
            ],
            "destinations": [
              {"type": "local"},
              {"type": "s3", "endpoint": "${BACKUP_S3_ENDPOINT:-}", "bucket": "${BACKUP_S3_BUCKET:-}",
               "access_key": "${BACKUP_S3_ACCESS_KEY:-}", "secret_key": "$${BACKUP_S3_SECRET_KEY}",
               "region": "${BACKUP_S3_REGION:-eu-central-1}", "prefix": "${BACKUP_S3_PREFIX:-iam/}"}
            ],
            "schedule": {"mode": "${BACKUP_SCHEDULE_MODE:-cron}", "cron": "${BACKUP_SCHEDULE_CRON:-15 3 * * *}"},
            "retention": {"count": ${BACKUP_RETENTION_COUNT:-14}},
            "notifications": {
              "channels": "${BACKUP_ALERT_CHANNELS:-}",
              "level": "${BACKUP_ALERT_LEVEL:-warnings}",
              "email": {"host": "${SMTP_HOST:-}", "port": ${SMTP_PORT:-587}, "tls": true,
                        "username": "${SMTP_USERNAME:-}", "password": "$${SMTP_PASSWORD}",
                        "sender": "${SMTP_FROM_EMAIL:-}", "recipients": ["${BACKUP_ALERT_EMAIL:-}"]},
              "webhook": {"url": "${BACKUP_WEBHOOK_URL:-}", "secret": "$${WEBHOOK_SECRET}"},
              "teams": {"url": "${BACKUP_TEAMS_WEBHOOK:-}"}
            }
          }]
        }
    volumes:
      - backup-data:/data
    depends_on:
      database-server:
        condition: service_healthy
    networks:
      - local

  # ── Mailpit — dev mail catcher (captures all outgoing mail, no real send) ───
  # Modern, maintained MailHog replacement. Zitadel sends notifications (verify,
  # password reset, OTP-email) to mailpit:1025; read them in the web UI at
  # http://localhost:${MAILPIT_UI_PORT:-8025}. Prod uses a real MTA via SMTP_*.
  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit}:${MAILPIT_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_MAILPIT
    restart: unless-stopped
    <<: *logging
    environment:
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    expose:
      - "1025"
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - local

  # ── OIDC test client (opt-in: --profile test) ───────────────────────────────
  # Runs the real auth-code+PKCE flow against the IAM and validates the demo
  # user's roles (rUser+rManager in pDemo, not rAdministrator). Browse
  # http://localhost:8888 → "Login & validate"; GET /validate returns JSON.
  # Needs the Demo app creds — after the stack is up:
  #   cd terraform && tofu output demo_app_client_id   (+ -raw demo_app_client_secret)
  # then set OIDC_TEST_CLIENT_ID / OIDC_TEST_CLIENT_SECRET in .env and:
  #   docker compose -f docker-compose.development.yml --profile test up oidc-test-client
  # (Browser + container both resolve `zitadel` via the 127.0.0.1 hosts entry.)
  oidc-test-client:
    profiles: ["test"]
    build:
      context: ./tests/oidc-test-client
    container_name: ${STACK_NAME:-iam}_OIDC_TEST
    restart: "no"
    <<: *logging
    environment:
      # Browser-facing issuer (https proxy origin); backend token/userinfo calls
      # go straight to the core over internal http with a Host override.
      OIDC_ISSUER: https://${IAM_DEV_HOSTNAME:-iam.example.test}:${IAM_DEV_PORT:-8080}
      OIDC_BACKEND_URL: http://zitadel:8080
      OIDC_BACKEND_HOST: ${IAM_DEV_HOSTNAME:-iam.example.test}:${IAM_DEV_PORT:-8080}
      OIDC_CLIENT_ID: ${OIDC_TEST_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_TEST_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: http://localhost:8888/callback
      OIDC_EXPECTED_ROLES: rUser,rManager
      OIDC_FORBIDDEN_ROLES: rAdministrator
      OIDC_VERIFY_TLS: "false"
    ports:
      - "8888:8888"
    networks:
      - local


### Volumes ###
volumes:
  database-data:
    driver: local
    name: ${STACK_NAME:-iam}-database
  machinekey:
    driver: local
    name: ${STACK_NAME:-iam}-machinekey
  tfstate:
    driver: local
    name: ${STACK_NAME:-iam}-tfstate
  sync-data:
    driver: local
    name: ${STACK_NAME:-iam}-sync
  backup-data:
    driver: local
    name: ${STACK_NAME:-iam}-backup
  certs:
    driver: local
    name: ${STACK_NAME:-iam}-certs


### Networks ###
networks:
  local:
    driver: bridge
    name: ${STACK_NAME:-iam}
    enable_ipv6: true
