# =============================================================================
# CS-IAM — Zitadel OIDC/IAM Stack — Development (direct ports, HTTP)
# =============================================================================
# Local development on http://localhost:8080 with TLS disabled.
#   docker compose -f docker-compose.development.yml up -d
#
# Bootstrap order:
#   zitadel-db (healthy) → zitadel (FirstInstance writes the machine key) →
#   zitadel-provision (OpenTofu applies IdPs/projects/apps) → zitadel-sync.
# zitadel has no in-container healthcheck (distroless image, no shell/curl),
# so the dependent containers poll readiness + the machine-key file themselves.
# =============================================================================

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "25m"
      max-file: "3"

services:
  # ── PostgreSQL 18 ──────────────────────────────────────────────────────────
  zitadel-db:
    image: ${POSTGRES_IMAGE:-postgres}:${POSTGRES_VERSION:-18-alpine}
    container_name: ${STACK_NAME:-iam}_DB
    hostname: zitadel-db
    restart: unless-stopped
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      POSTGRES_DB: ${ZITADEL_DB_NAME:-zitadel}
      POSTGRES_USER: ${ZITADEL_DB_USER:-zitadel}
      POSTGRES_PASSWORD: ${ZITADEL_DB_PASSWORD:?Set ZITADEL_DB_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command: >
      -c max_connections=${PG_MAX_CONNECTIONS:-100}
      -c shared_buffers=${PG_SHARED_BUFFERS:-256MB}
      -c work_mem=${PG_WORK_MEM:-4MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-768MB}
      -c maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-64MB}
    volumes:
      - zitadel-db-data:/var/lib/postgresql
    expose:
      - 5432/tcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ZITADEL_DB_USER:-zitadel} -d ${ZITADEL_DB_NAME:-zitadel}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - local

  # ── Zitadel (OIDC broker) ──────────────────────────────────────────────────
  zitadel:
    image: ${ZITADEL_IMAGE:-ghcr.io/zitadel/zitadel}:${ZITADEL_VERSION:-v4.15.0}
    container_name: ${STACK_NAME:-iam}_APP
    hostname: zitadel
    restart: unless-stopped
    <<: *logging
    command: >
      start-from-init
      --masterkey "${ZITADEL_MASTERKEY:?Set ZITADEL_MASTERKEY in .env}"
      --config /zitadel/config/defaults.yaml
      --steps /zitadel/config/steps.yaml
      --tlsMode disabled
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      # ── Database connection ───────────────────────────────────────────────
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DB_NAME:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${ZITADEL_DB_USER:-zitadel}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${ZITADEL_DB_USER:-zitadel}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # ── External access (dev = plain HTTP) ────────────────────────────────
      # Issuer host = zitadel.localhost so the SAME URL resolves from the host
      # browser (*.localhost → 127.0.0.1 → published port) AND from the
      # automation containers (network alias → zitadel:8080). This keeps the
      # OIDC issuer / JWT audience consistent everywhere.
      ZITADEL_EXTERNALDOMAIN: ${IAM_DEV_HOSTNAME:-zitadel.localhost}
      ZITADEL_EXTERNALPORT: ${IAM_DEV_PORT:-8080}
      ZITADEL_EXTERNALSECURE: "false"
      # ── First-instance admin password (overrides steps.yaml) ──────────────
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:?Set ZITADEL_ADMIN_PASSWORD in .env}
    volumes:
      - ./config/zitadel/defaults.yaml:/zitadel/config/defaults.yaml:ro
      - ./config/zitadel/steps.yaml:/zitadel/config/steps.yaml:ro
      - machinekey:/machinekey
    ports:
      - "${IAM_DEV_PORT:-8080}:8080"
    depends_on:
      zitadel-db:
        condition: service_healthy
    networks:
      local:
        aliases:
          - ${IAM_DEV_HOSTNAME:-zitadel.localhost}

  # ── Provisioning (OpenTofu IaC, one-shot, non-destructive) ─────────────────
  zitadel-provision:
    build:
      context: .
      dockerfile: ./src/zitadel-provision/Dockerfile
    image: ${PROVISION_IMAGE:-ghcr.io/bauer-group/cs-iam/zitadel-provision}:${PROVISION_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_PROVISION
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      ZITADEL_DOMAIN: ${IAM_DEV_HOSTNAME:-zitadel.localhost}
      ZITADEL_PORT: ${IAM_DEV_PORT:-8080}
      ZITADEL_INSECURE: "true" # dev: plain HTTP
      ZITADEL_JWT_PROFILE_FILE: /machinekey/iam-admin.json
      ZITADEL_WAIT_TIMEOUT: ${PROVISION_WAIT_TIMEOUT:-120}
      # Terraform variables (TF_VAR_*) — Entra IdP is created only when set
      TF_VAR_zitadel_domain: ${IAM_DEV_HOSTNAME:-zitadel.localhost}
      TF_VAR_zitadel_port: ${IAM_DEV_PORT:-8080}
      TF_VAR_zitadel_insecure: "true"
      TF_VAR_role_prefix: ${SYNC_ROLE_PREFIX:-entra:}
      TF_VAR_azure_client_id: ${AZURE_CLIENT_ID:-}
      TF_VAR_azure_client_secret: ${AZURE_CLIENT_SECRET:-}
      TF_VAR_azure_tenant_id: ${AZURE_TENANT_ID:-}
      TF_VAR_app_redirect_uris: ${APP_REDIRECT_URIS:-[]}
    volumes:
      - machinekey:/machinekey:ro
      - tfstate:/tfstate
    depends_on:
      zitadel:
        condition: service_started
    networks:
      - local

  # ── Directory-sync (Graph delta → Zitadel; default service) ────────────────
  zitadel-sync:
    build:
      context: ./src/zitadel-sync
      dockerfile: Dockerfile
    image: ${SYNC_IMAGE:-ghcr.io/bauer-group/cs-iam/zitadel-sync}:${SYNC_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_SYNC
    restart: unless-stopped
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      ZITADEL_DOMAIN: ${IAM_DEV_HOSTNAME:-zitadel.localhost}
      ZITADEL_PORT: ${IAM_DEV_PORT:-8080}
      ZITADEL_INSECURE: "true"
      ZITADEL_JWT_PROFILE_FILE: /machinekey/iam-admin.json
      ZITADEL_WAIT_TIMEOUT: ${SYNC_WAIT_TIMEOUT:-180}
      SYNC_ENABLED: ${SYNC_ENABLED:-true}
      SYNC_PROFILES_INTERVAL: ${SYNC_PROFILES_INTERVAL:-300}
      SYNC_GROUPS_INTERVAL: ${SYNC_GROUPS_INTERVAL:-600}
      SYNC_ROLE_PREFIX: ${SYNC_ROLE_PREFIX:-entra:}
      SYNC_PROJECT_NAME: ${SYNC_PROJECT_NAME:-BAUER GROUP}
      SYNC_LOG_LEVEL: ${SYNC_LOG_LEVEL:-INFO}
      SYNC_LOG_FORMAT: ${SYNC_LOG_FORMAT:-console}
    volumes:
      - machinekey:/machinekey:ro
      - sync-state:/data
    depends_on:
      zitadel-provision:
        condition: service_completed_successfully
    networks:
      - local

  # ── Backup (pg_dump, opt-in via --profile backup) ──────────────────────────
  zitadel-backup:
    build:
      context: ./src/zitadel-backup
      dockerfile: Dockerfile
    image: ${BACKUP_IMAGE:-ghcr.io/bauer-group/cs-iam/zitadel-backup}:${BACKUP_VERSION:-latest}
    container_name: ${STACK_NAME:-iam}_BACKUP
    profiles: ["backup"]
    restart: unless-stopped
    <<: *logging
    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}
      INSTANCE_NAME: ${STACK_NAME:-iam}
      DB_HOST: zitadel-db
      DB_PORT: 5432
      DB_NAME: ${ZITADEL_DB_NAME:-zitadel}
      DB_USER: ${ZITADEL_DB_USER:-zitadel}
      DB_PASSWORD: ${ZITADEL_DB_PASSWORD}
      DB_SSL_MODE: disable
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-14}
      BACKUP_SCHEDULE_ENABLED: ${BACKUP_SCHEDULE_ENABLED:-true}
      BACKUP_SCHEDULE_MODE: ${BACKUP_SCHEDULE_MODE:-cron}
      BACKUP_SCHEDULE_CRON: ${BACKUP_SCHEDULE_CRON:-15 3 * * *}
      BACKUP_LOG_LEVEL: ${BACKUP_LOG_LEVEL:-INFO}
    volumes:
      - backup-data:/data
    depends_on:
      zitadel-db:
        condition: service_healthy
    networks:
      - local

volumes:
  zitadel-db-data:
    name: ${STACK_NAME:-iam}-db
  machinekey:
    name: ${STACK_NAME:-iam}-machinekey
  tfstate:
    name: ${STACK_NAME:-iam}-tfstate
  sync-state:
    name: ${STACK_NAME:-iam}-sync
  backup-data:
    name: ${STACK_NAME:-iam}-backup

networks:
  local:
    driver: bridge
    name: ${STACK_NAME:-iam}
    enable_ipv6: true
